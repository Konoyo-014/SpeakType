<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Main background gradient: deep blue to vibrant purple -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>

    <!-- Subtle inner glow gradient -->
    <radialGradient id="innerGlow" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Waveform gradient -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>

    <!-- Shadow filter for depth -->
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="rgba(0,0,0,0.3)"/>
    </filter>

    <!-- Subtle inner shadow for the bubble -->
    <filter id="bubbleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background: macOS-style rounded square -->
  <rect x="20" y="20" width="984" height="984" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Inner glow overlay -->
  <rect x="20" y="20" width="984" height="984" rx="220" ry="220" fill="url(#innerGlow)"/>

  <!-- Speech bubble shape - modern, asymmetric, slightly tilted for dynamism -->
  <!-- Main bubble body -->
  <path d="
    M 280 260
    C 280 220, 320 190, 370 190
    L 700 190
    C 750 190, 780 220, 780 260
    L 780 530
    C 780 570, 750 600, 700 600
    L 460 600
    L 350 700
    L 380 600
    L 370 600
    C 320 600, 280 570, 280 530
    Z
  "
  fill="rgba(255,255,255,0.95)"
  stroke="none"/>

  <!-- Subtle shadow under bubble for depth -->
  <path d="
    M 280 260
    C 280 220, 320 190, 370 190
    L 700 190
    C 750 190, 780 220, 780 260
    L 780 530
    C 780 570, 750 600, 700 600
    L 460 600
    L 350 700
    L 380 600
    L 370 600
    C 320 600, 280 570, 280 530
    Z
  "
  fill="none"
  stroke="rgba(79,70,229,0.15)"
  stroke-width="3"/>

  <!-- Sound waveform inside the bubble - 7 bars, center-aligned, varying heights -->
  <!-- The waveform represents voice/audio being captured -->
  <g transform="translate(530, 395)">
    <!-- Bar 1 (leftmost) -->
    <rect x="-180" y="-35" width="28" height="70" rx="14" fill="#7C3AED" opacity="0.7"/>
    <!-- Bar 2 -->
    <rect x="-120" y="-65" width="28" height="130" rx="14" fill="#6D28D9" opacity="0.8"/>
    <!-- Bar 3 -->
    <rect x="-60" y="-90" width="28" height="180" rx="14" fill="#5B21B6" opacity="0.85"/>
    <!-- Bar 4 (center, tallest) -->
    <rect x="0" y="-110" width="28" height="220" rx="14" fill="#4F46E5" opacity="0.95"/>
    <!-- Bar 5 -->
    <rect x="60" y="-80" width="28" height="160" rx="14" fill="#5B21B6" opacity="0.85"/>
    <!-- Bar 6 -->
    <rect x="120" y="-55" width="28" height="110" rx="14" fill="#6D28D9" opacity="0.8"/>
    <!-- Bar 7 (rightmost) -->
    <rect x="180" y="-30" width="28" height="60" rx="14" fill="#7C3AED" opacity="0.7"/>
  </g>

  <!-- Text cursor (caret) on the right side of the bubble - representing "typing" output -->
  <!-- This is the key differentiator: voice becomes text -->
  <rect x="735" y="340" width="6" height="110" rx="3" fill="#4F46E5" opacity="0.6"/>

  <!-- Small decorative dots below bubble tail - like text being generated -->
  <circle cx="310" cy="740" r="18" fill="rgba(255,255,255,0.6)"/>
  <circle cx="260" cy="790" r="12" fill="rgba(255,255,255,0.4)"/>
  <circle cx="220" cy="830" r="8" fill="rgba(255,255,255,0.25)"/>
</svg>